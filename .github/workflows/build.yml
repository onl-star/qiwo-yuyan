name: Build Qiwo IME APK

on:
  push:
    branches:
      - main
      - 'dev/**'
      - 'feat/**'
      - 'fix/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      QIWO_INPUT_FORMAT_CORE_DIR: qiwo-input-format-core
      QIWO_ANDROID_RIME_CORE_DIR: qiwo-android-rime-core
      QIWO_ANDROID_RIME_CORE_PACKAGE: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout qiwo-sync-core
        uses: actions/checkout@v6
        with:
          repository: LeaWron/qiwo-sync-core
          ref: ${{ github.ref_name }}
          path: qiwo-sync-core

      - name: Checkout qiwo-input-format-core
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/qiwo-input-format-core
          path: qiwo-input-format-core

      - name: Checkout qiwo-android-rime-core
        uses: actions/checkout@v6
        with:
          repository: LeaWron/qiwo-android-rime-core
          path: qiwo-android-rime-core
          ssh-key: ${{ secrets.QIWO_ANDROID_RIME_CORE_DEPLOY_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Android SDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          NDK_VERSION="26.3.11579264"
          yes | "${SDKMANAGER}" --licenses >/dev/null || true
          "${SDKMANAGER}" "platform-tools" "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1"
          if [ -n "${ANDROID_NDK_HOME:-}" ] && [ -d "${ANDROID_NDK_HOME}" ]; then
            echo "Using preinstalled NDK: ${ANDROID_NDK_HOME}"
          elif [ -n "${ANDROID_NDK_LATEST_HOME:-}" ] && [ -d "${ANDROID_NDK_LATEST_HOME}" ]; then
            ANDROID_NDK_HOME="${ANDROID_NDK_LATEST_HOME}"
            echo "Using latest preinstalled NDK: ${ANDROID_NDK_HOME}"
          else
            "${SDKMANAGER}" "ndk;${NDK_VERSION}"
            ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${NDK_VERSION}"
          fi
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> "${GITHUB_ENV}"

      - name: Build qiwo-android-rime-core JNI libraries
        working-directory: ${{ env.QIWO_ANDROID_RIME_CORE_DIR }}
        run: scripts/build-android.sh

      - name: Verify qiwo-android-rime-core JNI artifacts
        working-directory: ${{ env.QIWO_ANDROID_RIME_CORE_DIR }}
        run: scripts/verify-artifacts.sh target/android-jniLibs

      - name: Verify qiwo-android-rime-core JNI symbols
        working-directory: ${{ env.QIWO_ANDROID_RIME_CORE_DIR }}
        run: scripts/verify-symbols.sh target/android-jniLibs/arm64-v8a/libyuyanime.so

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Build qiwo-input-format-core JNI libraries
        run: |
          NDK_TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/aarch64-linux-android23-clang"
          export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER="${NDK_TOOLCHAIN}/armv7a-linux-androideabi23-clang"
          export CARGO_TARGET_I686_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/i686-linux-android23-clang"
          export CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/x86_64-linux-android23-clang"
          export AR_aarch64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          export AR_armv7_linux_androideabi="${NDK_TOOLCHAIN}/llvm-ar"
          export AR_i686_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          export AR_x86_64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          test -x "${CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER}"
          test -x "${CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER}"
          test -x "${CARGO_TARGET_I686_LINUX_ANDROID_LINKER}"
          test -x "${CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER}"
          for target in aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android; do
            cargo build --manifest-path "${QIWO_INPUT_FORMAT_CORE_DIR}/Cargo.toml" --release -p qiwo-input-format --target "${target}"
          done

      - name: Build qiwo-sync-core JNI library
        run: |
          NDK_TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/aarch64-linux-android23-clang"
          export CC_aarch64_linux_android="${CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER}"
          export AR_aarch64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          test -x "${CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER}"
          cargo build --manifest-path qiwo-sync-core/Cargo.toml --release -p qiwo-sync --target aarch64-linux-android
          mkdir -p yuyansdk/src/main/jniLibs/arm64-v8a
          cp qiwo-sync-core/target/aarch64-linux-android/release/libqiwo_sync.so yuyansdk/src/main/jniLibs/arm64-v8a/

      - name: Install librime tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq librime-bin librime-data

      - name: Precompile rime-frost schemas
        run: |
          set -e
          RIME_DIR="/tmp/rime-build"
          FROST_SRC="yuyansdk/src/main/assets/rime_frost"
          mkdir -p "$RIME_DIR"

          # 复制 rime_frost 所有文件到临时 Rime 用户目录
          cp -r "$FROST_SRC"/* "$RIME_DIR/" 2>/dev/null || true
          # 清理不需要编译的辅助文件
          rm -f "$RIME_DIR"/essay.txt 2>/dev/null || true

          # 创建 default.yaml（rimedeployer 需要）
          cat > "$RIME_DIR/default.yaml" << 'YAML'
          config_version: "2026-06-03"
          schema_list:
            - schema: rime_frost_android
            # Full rime_frost requires librime-lua. Current Android runtime uses
            # the legacy yuyan backend, so CI only prebuilds the lua-free
            # compatibility schema.
          menu:
            page_size: 8
          YAML

          # 确保 installation.yaml 存在
          if [ ! -f "$RIME_DIR/installation.yaml" ]; then
            echo "distribution: Qiwo" > "$RIME_DIR/installation.yaml"
            echo "installation_id: qiwo-android" >> "$RIME_DIR/installation.yaml"
          fi

          echo "=== Rime user dir contents ==="
          ls -la "$RIME_DIR/" | head -20
          echo "=== Schema files ==="
          ls "$RIME_DIR"/*.schema.yaml 2>/dev/null || echo "(none at root)"
          echo "=== Dict files ==="
          ls "$RIME_DIR"/*.dict.yaml 2>/dev/null | head -5 || echo "(none at root)"

          # 运行 rime_deployer 编译
          echo "=== Running rime_deployer ==="
          cd "$RIME_DIR"
          rime_deployer --build "$RIME_DIR" 2>&1 || {
            echo "rime_deployer failed (may need newer librime). Trying alternative..."
            # 备选：逐个编译 schema
            for schema in rime_frost_android; do
              if [ -f "${schema}.schema.yaml" ]; then
                echo "Selecting schema: $schema"
                # 尝试用 API 方式编译（如果 deployer 不支持）
              fi
            done
            exit 0  # 非致命错误，用原始 yaml 文件继续构建
          }

          # 检查编译产物并合并到原始 rime build/ 目录
          RIME_BUILD_SRC="$GITHUB_WORKSPACE/yuyansdk/src/main/assets/rime/build"
          if [ -d "$RIME_DIR/build" ] && [ "$(ls -A "$RIME_DIR/build" 2>/dev/null)" ]; then
            echo "=== Precompiled frost binaries ==="
            ls -la "$RIME_DIR/build/"
            # 合并完整部署产物到原始 build/，否则 Android fullCheck=false 时无法直接选择 frost schema。
            cp -n "$RIME_DIR"/build/* "$RIME_BUILD_SRC/" 2>/dev/null || true
            echo "=== Merged into assets/rime/build/ ==="
            ls -la "$RIME_BUILD_SRC/" | grep -E "rime_frost|melt_eng" || echo "(new frost binaries added)"
          else
            echo "Warning: rime_deployer produced no binaries. Using source yaml only."
          fi
        shell: bash

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleOfflineDebug

      - name: Verify Debug APK Rime Core Contents
        run: bash tests/verify_android_rime_core_apk_artifact.sh app/build/outputs/apk/offline/debug/*.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: qiwo-debug-apk-rime-core-wrapper
          path: app/build/outputs/apk/offline/debug/*.apk
          retention-days: 7

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      QIWO_INPUT_FORMAT_CORE_DIR: qiwo-input-format-core
      QIWO_ANDROID_RIME_CORE_DIR: qiwo-android-rime-core
      QIWO_ANDROID_RIME_CORE_PACKAGE: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout qiwo-sync-core
        uses: actions/checkout@v6
        with:
          repository: LeaWron/qiwo-sync-core
          ref: ${{ github.ref_name }}
          path: qiwo-sync-core

      - name: Checkout qiwo-input-format-core
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/qiwo-input-format-core
          path: qiwo-input-format-core

      - name: Checkout qiwo-android-rime-core
        uses: actions/checkout@v6
        with:
          repository: LeaWron/qiwo-android-rime-core
          path: qiwo-android-rime-core
          ssh-key: ${{ secrets.QIWO_ANDROID_RIME_CORE_DEPLOY_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configure Android SDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          NDK_VERSION="26.3.11579264"
          yes | "${SDKMANAGER}" --licenses >/dev/null || true
          "${SDKMANAGER}" "platform-tools" "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1"
          if [ -n "${ANDROID_NDK_HOME:-}" ] && [ -d "${ANDROID_NDK_HOME}" ]; then
            echo "Using preinstalled NDK: ${ANDROID_NDK_HOME}"
          elif [ -n "${ANDROID_NDK_LATEST_HOME:-}" ] && [ -d "${ANDROID_NDK_LATEST_HOME}" ]; then
            ANDROID_NDK_HOME="${ANDROID_NDK_LATEST_HOME}"
            echo "Using latest preinstalled NDK: ${ANDROID_NDK_HOME}"
          else
            "${SDKMANAGER}" "ndk;${NDK_VERSION}"
            ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/${NDK_VERSION}"
          fi
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> "${GITHUB_ENV}"

      - name: Build qiwo-android-rime-core JNI libraries
        working-directory: ${{ env.QIWO_ANDROID_RIME_CORE_DIR }}
        run: scripts/build-android.sh

      - name: Verify qiwo-android-rime-core JNI artifacts
        working-directory: ${{ env.QIWO_ANDROID_RIME_CORE_DIR }}
        run: scripts/verify-artifacts.sh target/android-jniLibs

      - name: Verify qiwo-android-rime-core JNI symbols
        working-directory: ${{ env.QIWO_ANDROID_RIME_CORE_DIR }}
        run: scripts/verify-symbols.sh target/android-jniLibs/arm64-v8a/libyuyanime.so

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Build qiwo-input-format-core JNI libraries
        run: |
          NDK_TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/aarch64-linux-android23-clang"
          export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER="${NDK_TOOLCHAIN}/armv7a-linux-androideabi23-clang"
          export CARGO_TARGET_I686_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/i686-linux-android23-clang"
          export CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/x86_64-linux-android23-clang"
          export AR_aarch64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          export AR_armv7_linux_androideabi="${NDK_TOOLCHAIN}/llvm-ar"
          export AR_i686_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          export AR_x86_64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          test -x "${CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER}"
          test -x "${CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER}"
          test -x "${CARGO_TARGET_I686_LINUX_ANDROID_LINKER}"
          test -x "${CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER}"
          for target in aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android; do
            cargo build --manifest-path "${QIWO_INPUT_FORMAT_CORE_DIR}/Cargo.toml" --release -p qiwo-input-format --target "${target}"
          done

      - name: Build qiwo-sync-core JNI library
        run: |
          NDK_TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/aarch64-linux-android23-clang"
          export CC_aarch64_linux_android="${CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER}"
          export AR_aarch64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          test -x "${CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER}"
          cargo build --manifest-path qiwo-sync-core/Cargo.toml --release -p qiwo-sync --target aarch64-linux-android
          mkdir -p yuyansdk/src/main/jniLibs/arm64-v8a
          cp qiwo-sync-core/target/aarch64-linux-android/release/libqiwo_sync.so yuyansdk/src/main/jniLibs/arm64-v8a/

      - name: Decode Keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/qiwo-release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleOffline
        env:
          RELEASE_STORE_FILE: ${{ secrets.RELEASE_STORE_FILE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: qiwo-release-apk-rime-core-wrapper
          path: app/build/outputs/apk/offline/release/*.apk
          retention-days: 7

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            app/build/outputs/apk/offline/release/*.apk
            app/build/outputs/apk/offline/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
