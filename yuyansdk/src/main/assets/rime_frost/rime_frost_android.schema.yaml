# Rime schema
# encoding: utf-8

schema:
  schema_id: rime_frost_android
  name: 白霜拼音
  version: "2026-06-13"
  author:
    - Dvel
    - gaboolic
  description: |
    白霜拼音 Android 兼容方案。
    当前 Android 旧 native 后端未加载 Rime Lua 模块，因此此方案保留白霜主词库和基础拼写，
    去掉完整白霜 schema 里的 Lua 扩展组件以及缺失的细胞词库依赖。

switches:
  - name: ascii_mode
    states: [ 中文, 英文 ]
  - name: traditionalization
    states: [ 简体, 繁体 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ 。，, ．， ]
  - name: emoji
    states: [ 💀, 😄 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier@emoji
    - simplifier@traditionalize
    - uniquifier

translator:
  grammar_penalty: -4
  max_homophones: 4
  max_homographs: 4
  max_sentences: 3
  dictionary: rime_frost_android
  spelling_hints: 8
  always_show_comments: true
  initial_quality: 1.2
  comment_format:
    - xform/^/［/
    - xform/$/］/
  preedit_format:
    - xform/([jqxy])v/$1u/
    - xform/([nl])v/$1v/
    - xform/([nl])ue/$1ve/

emoji:
  option_name: emoji
  opencc_config: emoji.json
  inherit_comment: false

traditionalize:
  option_name: traditionalization
  opencc_config: s2t.json
  tips: none
  tags: [ abc ]

punctuator:
  full_shape:
    " ": { commit: "　" }
    ",": { commit: ， }
    ".": { commit: 。 }
    "<": [ 《, 〈, «, ‹ ]
    ">": [ 》, 〉, », › ]
    "/": [ ／, ÷ ]
    "?": { commit: ？ }
    ";": { commit: ； }
    ":": { commit: ： }
    "'": { pair: [ 「, 」 ] }
    "\"": { pair: [ “, ” ] }
    "\\": [ 、, ＼ ]
    "|": [ ·, ｜, "§", "¦" ]
    "`": ｀
    "~": ～
    "!": { commit: ！ }
    "@": [ ＠, ☯ ]
    "#": [ ＃, ⌘ ]
    "%": [ ％, "°", "℃" ]
    "$": [ ￥, "$", "€", "£", "¥", "¢", "¤" ]
    "^": { commit: …… }
    "&": ＆
    "*": [ ＊, ·, ・, ×, ※, ❂ ]
    "(": （
    ")": ）
    "-": －
    "_": ——
    "+": ＋
    "=": ＝
    "[": [ 「, 【, 〔, ［ ]
    "]": [ 」, 】, 〕, ］ ]
    "{": [ 『, 〖, ｛ ]
    "}": [ 』, 〗, ｝ ]
  half_shape:
    ",": { commit: ， }
    ".": { commit: 。 }
    "<": [ 《, 〈, «, ‹ ]
    ">": [ 》, 〉, », › ]
    "/": [ "/", ／, ÷ ]
    "?": { commit: ？ }
    ";": { commit: ； }
    ":": { commit: ： }
    "'": { pair: [ 「, 」 ] }
    "\"": { pair: [ “, ” ] }
    "\\": [ 、, "\\", ＼ ]
    "|": [ ·, "|", ｜, "§", "¦" ]
    "`": "`"
    "~": "~"
    "!": { commit: ！ }
    "@": "@"
    "#": "#"
    "%": "%"
    "$": [ ￥, "$", "€", "£", "¥", "¢", "¤" ]
    "^": { commit: …… }
    "&": "&"
    "*": "*"
    "(": （
    ")": ）
    "-": "-"
    "_": ——
    "+": "+"
    "=": "="
    "[": [ 「, 【, 〔, ［ ]
    "]": [ 」, 】, 〕, ］ ]
    "{": [ 『, 〖, ｛ ]
    "}": [ 』, 〗, ｝ ]
  symbols:
    "/": [ "@", "＃", "＊", "＋", "……", "〜", "（", "）", "、", "/" ]

recognizer:
  patterns:
    punct: "^/([0-9]|10|[A-Za-z]+)$"

key_binder:
  bindings:
    - { when: has_menu, accept: semicolon, send: 2 }

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA`/
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"
  algebra:
    - erase/^hm$/
    - erase/^m$/
    - erase/^n$/
    - erase/^ng$/
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    - derive/^([nl])ue$/$1ve/
    - derive/^([jqxy])v/$1u/
